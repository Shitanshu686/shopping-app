<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping App</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .Products {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 220px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        button {
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        #cart {
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>

<body>
    <input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)">
    <h1>Shopping App</h1>
    <div class="Products" id="products">

    </div>
    <div id="cart">
        <h2>Cart</h2>

        <ul id="cartItems"></ul>

        <h3>Total : $<span id="total">0</span></h3>

        <h4>Total Items: <span id="itemCount">0</span></h4>

        <button onclick="buyNow()">Buy Now</button>
    </div>
    <script>
        let cart = {}
        async function loadProducts() {

            const response = await fetch("http://localhost:8080/products");

            const products = await response.json();

            let productDiv = document.getElementById("products");

            products.forEach(product => {

                productDiv.innerHTML += `
        <div class="card">

            <img src="${product.image}">

            <h3>${product.name}</h3>

            <p>$${product.price}</p>

            <button onclick="addtoCart('${product.name}',${product.price})">
                Add to Cart
            </button>

        </div>
        `;

            });

        }
        function addtoCart(product, price) {
            if (cart[product]) {
                if (cart[product].quantity >= 5) {
                    alert("Limit reached (Max 5 allowed)");
                    return;
                }
                cart[product].quantity++;
            }
            else {
                cart[product] = {
                    price: price,
                    quantity: 1
                };
            }
            updateCart();
        }
        function changeQty(product, action) {
            if (action == "inc") {
                cart[product].quantity++;
            }
            else {
                cart[product].quantity--;
                if (cart[product].quantity <= 0) {
                    delete cart[product];
                }
            }
            updateCart();
        }
        function updateCart() {
            let cartItems = document.getElementById("cartItems");
            cartItems.innerHTML = "";
            let count = 0;
            let total = 0;
            for (product in cart) {
                let item = cart[product];
                let li = document.createElement("li");
                count += item.quantity;
                li.innerHTML = `${product}X${item.quantity}=$${item.quantity * item.price}

                <button onclick="changeQty('${product}','inc')">+</button>
                <button onclick="changeQty('${product}','dec')">-</button>

                <button onclick="removeItem('${product}')">Remove</button> ;
`;
                cartItems.appendChild(li);
                total += item.price * item.quantity;

            }
            document.getElementById("total").textContent = total;
            document.getElementById("itemCount").textContent = count;

        }
        function removeItem(product) {
            delete cart[product];
            updateCart();
        }
        function buyNow() {
            let total = document.getElementById("total").textContent;

            if (total == 0) {
                alert("Cart is Empty");
                return;

            }
            alert("Order placed for $" + total);
            cart = {}
            updateCart();
        }
        function searchProduct(value) {
            let cards = document.querySelectorAll(".card");
            value = value.toLowerCase();
            cards.forEach(card => {
                let name = card.querySelector("h3").textContent.toLowerCase();

                if (name.includes(value)) {
                    card.style.display = "block";
                }
                else {
                    card.style.display = "none";
                }
            });
        }
        loadProducts();
    </script>
</body>
